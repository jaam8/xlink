clickhouse:
  host: clickhouse
  port: 9000
  user: default
  password: "1234"
  db: xlink
  max_open_conns: 5
  max_idle_conns: 5

kafka:
  host: kafka
  port: 9092
  brokers:
    - kafka:9092
  min_bytes: 10
  max_bytes: 1048576
  max_wait_ms: 500
  commit_interval_ms: 1000

zookeeper:
  host: zookeeper
  port: 2181

postgres:
  host: postgres
  port: 5432
  db: xlink
  user: postgres
  password: "1234"
  max_conns: 10
  min_conns: 5


redis:
  host: redis
  port: 6379
  user: ""
  password: ""
  user_password: ""
  max_retries: 3
  pool_size: 10
  dial_timeout_seconds: 5
  read_timeout_seconds: 3
  write_timeout_seconds: 3

nginx:
  port_http: 81
  port_grpc: 50050
  entry_port: 80

gateway:
  port: 3000

http_port: 8080
http_port_renderer: 8085

upstream_names:
  shortener: shortener
  user_service: user_service
  analytics: analytics
  renderer: renderer
  tg_bot: tg_bot

upstream_ports:
  user_service: 50051
  shortener: 50052
  analytics: 50053
  renderer: 50054
  tg_bot: 50055

timeouts:
  shortener: 1000
  user_service: 1000
  analytics: 1000
  renderer: 1000
  tg_bot: 1000

user_service:
  grpc_port: 50051
  redis_db: 0
  token_len: 32
  cache_expiration_seconds: 3600
  migrations_path: file:///user_service/migrations

shortener:
  grpc_port: 50052
  redis_db: 1
  kafka_topic: redirect-events
  kafka_num_partitions: 1
  kafka_replication_factor: 1
  upstream_names: shortener
  upstream_ports: 50052
  timeouts: 1000
  expiration_seconds: 500
  default_link_expiration_minutes: 1440
  migrations_path: file:///shortener/migrations

analytics:
  grpc_port: 50053
  kafka_topic: redirect-events
  kafka_group_id: analytics-consumer
  redis_db: 2
  upstream_names: analytics
  upstream_ports: 50053
  migrations_path: file:///analytics/migrations
  timezone: Europe/Moscow
  batch_size: 1
  flush_timeout: 3
  timeouts: 1000

bot:
  grpc_port: 50055
  redis_db: 3
  bot_token:
  base_url: "http://nginx:80"
  upstream_names: tg_bot
  upstream_ports: 50055
  timeouts: 1000

expiration_seconds: 0

grpc_pool:
  max_connections: 10
  min_connections: 1
  max_retries: 3
  base_retry_delay_milliseconds: 300
