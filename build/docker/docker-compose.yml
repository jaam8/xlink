
services:
  user_service:
    container_name: user_service
    build:
      context: ../../
      dockerfile: build/docker/Dockerfile.user_service
    env_file:
      - ../../configs/.env
    ports:
      - ${USER_SERVICE_GRPC_PORT}:50051
    depends_on:
      - postgres
      - redis
      - kafka
    volumes:
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build

  shortener:
    container_name: shortener
    build:
      context: ../../
      dockerfile: build/docker/Dockerfile.shortener
    env_file:
      - ../../configs/.env
    ports:
      - ${SHORTENER_GRPC_PORT}:50052
    depends_on:
      - postgres
      - user_service
      - kafka
      - zookeeper
    volumes:
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build

