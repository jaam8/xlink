
services:
  gateway:
    container_name: gateway
    build:
      context: ../../
      dockerfile: build/docker/Dockerfile.gateway
    env_file:
      - ../../configs/.env
    ports:
      - ${GATEWAY_PORT}:50050
    depends_on:
      - postgres
      - kafka
      - clickhouse
      - zookeeper

  user_service:
    container_name: user_service
    build:
      context: ../../
      dockerfile: build/docker/Dockerfile.user_service
    env_file:
      - ../../configs/.env
    ports:
      - ${USER_SERVICE_GRPC_PORT}:50051
    depends_on:
      - gateway
      - clickhouse
      - postgres
      - redis
      - kafka
    volumes:
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build

  shortener:
    container_name: shortener
    build:
      context: ../../
      dockerfile: build/docker/Dockerfile.shortener
    env_file:
      - ../../configs/.env
    ports:
      - ${SHORTENER_GRPC_PORT}:50052
    depends_on:
      - postgres
      - user_service
      - kafka
      - zookeeper
    volumes:
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build

  analytics:
    container_name: analytics
    build:
      context: ../../
      dockerfile: build/docker/Dockerfile.analytics
    env_file:
      - ../../configs/.env
    ports:
      - ${ANALYTICS_GRPC_PORT}:50053
    depends_on:
      - user_service
      - shortener
      - postgres
      - redis
      - kafka
    volumes:
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build

