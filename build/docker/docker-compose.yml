
services:
  gateway:
    build:
      context: ../../
      dockerfile: build/docker/Dockerfile.gateway
    env_file:
      - ../../configs/.env
    expose:
      - ${GATEWAY_PORT}
    depends_on:
      - postgres
      - kafka
      - clickhouse
      - zookeeper
    scale: 3
    networks:
      - backend

  user_service:
    build:
      context: ../../
      dockerfile: build/docker/Dockerfile.user_service
    env_file:
      - ../../configs/.env
    expose:
      - ${USER_SERVICE_GRPC_PORT}
    depends_on:
      - gateway
      - clickhouse
      - postgres
      - redis
      - kafka
    restart: on-failure
    volumes:
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    scale: 3
    networks:
      - backend

  renderer:
    build:
      context: ../../
      dockerfile: build/docker/Dockerfile.renderer
    env_file:
      - ../../configs/.env
    expose:
      - ${HTTP_PORT_RENDERER}
    depends_on:
      - analytics
    restart: on-failure
    volumes:
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    scale: 3
    networks:
      - backend

  shortener:
    build:
      context: ../../
      dockerfile: build/docker/Dockerfile.shortener
    env_file:
      - ../../configs/.env
    expose:
      - ${SHORTENER_GRPC_PORT}
    depends_on:
      - postgres
      - user_service
      - kafka
      - zookeeper
    restart: on-failure
    volumes:
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    scale: 3
    networks:
      - backend

  analytics:
    build:
      context: ../../
      dockerfile: build/docker/Dockerfile.analytics
    env_file:
      - ../../configs/.env
    expose:
      - ${ANALYTICS_GRPC_PORT}
    depends_on:
      - user_service
      - shortener
      - postgres
      - redis
      - kafka
    restart: on-failure
    volumes:
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    scale: 3
    networks:
      - backend

  tg_bot:
    container_name: tg_bot
    build:
      context: ../../
      dockerfile: build/docker/Dockerfile.tg_bot
    expose:
      - ${BOT_GRPC_PORT}
    env_file:
      - ../../configs/.env
    restart: on-failure
    volumes:
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    networks:
      - backend

  postgres:
    image: postgres:latest
    container_name: postgres
    expose:
      - ${POSTGRES_PORT}
    env_file:
      - ../../configs/.env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:latest
    container_name: redis
    expose:
      - ${REDIS_PORT}
    hostname: ${REDIS_HOST}
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli", "ping" ]
      interval: 5s
      timeout: 1s
      retries: 3
    restart: unless-stopped
    networks:
      - backend

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    hostname: ${ZOOKEEPER_HOST}
    expose:
      - ${ZOOKEEPER_PORT}
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - backend

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    hostname: ${KAFKA_HOST}
    expose:
      - ${KAFKA_PORT}
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: ${ZOOKEEPER_HOST}:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092


      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
      - kafka-logs:/var/log/kafka
    healthcheck:
      test: [ "CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    expose:
      - ${CLICKHOUSE_PORT}
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-config:/etc/clickhouse-server/config.d
      - clickhouse-users:/etc/clickhouse-server/users.d
    networks:
      - backend


  entry_nginx:
    image: nginx:latest
    environment:
      - NGINX_ENTRY_PORT=${NGINX_ENTRY_PORT}
    container_name: nginx
    ports:
      - ${NGINX_ENTRY_PORT}:80
    command: ["nginx", "-g", "daemon off;"]
    depends_on:
      - gateway
      - user_service
      - shortener
      - analytics
      # - tg_bot
    volumes:
      - ../entry_nginx/conf.d:/etc/nginx/conf.d
    networks:
      - backend

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    networks:
      - backend
#    volumes:
#      - grafana-storage:/var/lib/grafana

volumes:
  go-mod-cache:
  go-build-cache:
  postgres_data:
  redis_data:
  clickhouse-data:
  clickhouse-config:
  clickhouse-users:
  kafka-data:
  kafka-logs:
  zookeeper-data:
  zookeeper-log:

networks:
  backend:
