<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Переход...</title>
  <style>
    body {
      margin: 0;
      background-color: #ffffff; /* Белый фон */
      color: #000000; /* Чёрный текст */
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 40px;
    }

    .loader-wrapper {
      position: relative;
      width: 450px;
      height: 450px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loader-wrapper::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      border: 8px solid rgba(0, 0, 0, 0.2); /* Серые границы */
      border-top: 8px solid #000000; /* Чёрная верхняя часть */
      border-radius: 50%;
      animation: spin 1s linear infinite;
      box-sizing: border-box;
    }

    .loader-wrapper img {
      width: 430px;
      height: auto;
      z-index: 1;
      border-radius: 50%;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
<h1 id="countdown">Автоматический переход по ссылке через 5...</h1>

<div class="loader-wrapper">
  <img src="/static/gggopher.gif" alt="Gopher" />
</div>

<script>
  const redirectUrl = "{{.TargetLink}}"; // ← можешь поменять на любую ссылку
  let seconds = 5;

  function generateRandomString(length) {
    const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    let result = '';
    for (let i = 0; i < length; i++) {
      const randomIndex = Math.floor(Math.random() * characters.length);
      result += characters[randomIndex];
    }
    return result;
  }

  function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
  }

  let visitorId = getCookie('xlinkVisitor');
  if (!visitorId) {
    visitorId = generateRandomString(32);
    document.cookie = `xlinkVisitor=${visitorId}; path=/;`;
  }

  const countdownEl = document.getElementById('countdown');
  const interval = setInterval(() => {
    seconds--;
    countdownEl.textContent = `Переход по ссылке через ${seconds}...`;
    if (seconds === 0) {
      clearInterval(interval);
      window.location.href = redirectUrl;
    }
  }, 1000);
</script>
</body>
</html>
